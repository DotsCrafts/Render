# Deterministic tier: install → build packages → typecheck → unit tests →
# nav-guard e2e (real Electron under Xvfb). No opencli daemon and no
# network-dependent journey proofs — those stay in the manual/nightly scripts
# (packages/opencli-bridge harness proofs, `pnpm --filter @render/desktop proof`,
# test:cdp), which need a macOS runner with a real opencli install.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  # cancelling on main would leave merged commits with no completed CI run
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck (all projects)
        run: pnpm typecheck

      - name: Unit tests (all packages + desktop)
        run: pnpm test

      - name: E2E — nav guard (real Electron under Xvfb)
        working-directory: apps/desktop
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
        run: xvfb-run -a pnpm test:nav
