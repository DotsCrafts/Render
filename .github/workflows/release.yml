name: Release

# Tag a version to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# Artifacts: macOS dmg+zip (arm64 + x64, unsigned prototype) and Linux
# AppImage+deb (x64), attached to a draft GitHub Release for review.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: package:mac
            artifact: render-macos
            files: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*-mac.zip
          - os: ubuntu-latest
            script: package:linux
            artifact: render-linux
            files: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      # Prototype releases are unsigned; flip when signing certs are configured.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Guard — tag must match package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg=$(node -p "require('./apps/desktop/package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag v$tag != apps/desktop version $pkg — bump package.json before tagging"
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package
        run: pnpm --filter @render/desktop ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  # Single job attaches everything — two matrix legs racing to create the same
  # draft release would create duplicate drafts.
  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/**
